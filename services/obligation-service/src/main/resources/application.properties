spring.application.name=obligation-service

# Default for local runs (Spring on host, Postgres from Docker on localhost:5432).
# Compose overrides via SPRING_DATASOURCE_*.
spring.datasource.url=jdbc:postgresql://localhost:5432/reglens
spring.datasource.username=reglens
spring.datasource.password=reglens_dev

spring.flyway.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
# Batches lazy-loaded documents when mapping pages of obligations (reduces N+1).
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Shared bearer token for service-to-service writes (ingestion). Override in production.
app.security.service-token=dev-service-token-change-me

# Comma-separated browser origins allowed to call this API (CORS).
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Clear INFO logs for RegLens controllers; set DEBUG to see list/pagination traces.
logging.level.com.reglens.obligation_service=INFO
