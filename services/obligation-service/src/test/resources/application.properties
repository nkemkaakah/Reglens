# Test profile defaults — mirror main app keys so SecurityFilterChain wires in @SpringBootTest.
app.security.service-token=test-service-token
spring.application.name=obligation-service

# Match production Pattern 2: Flyway + JPA use schema `obligation` (JDBC URL comes from Testcontainers).
spring.flyway.schemas=obligation
spring.flyway.default-schema=obligation
spring.flyway.create-schemas=true
spring.jpa.properties.hibernate.default_schema=obligation