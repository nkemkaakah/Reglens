spring.application.name=ai-registry-service
server.port=8083

# Pattern 2: same Postgres DB `reglens`, dedicated schema `ai_registry` for Flyway + JPA (Feature 6 — AI registry).
spring.datasource.url=jdbc:postgresql://localhost:5432/reglens?currentSchema=ai_registry
spring.datasource.username=reglens
spring.datasource.password=reglens_dev

spring.flyway.enabled=true
spring.flyway.schemas=ai_registry
spring.flyway.default-schema=ai_registry
spring.flyway.create-schemas=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=ai_registry
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Large governance artefacts (model cards, evaluation exports) in MongoDB; relational truth stays in Postgres.
spring.data.mongodb.uri=mongodb://localhost:27017/reglens_ai_registry

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.topic-ai-system-lifecycle=ai_system.lifecycle

app.security.service-token=dev-service-token-change-me

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.com.reglens.ai_registry_service=INFO
