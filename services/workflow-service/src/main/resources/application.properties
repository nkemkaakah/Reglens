spring.application.name=workflow-service
server.port=8084

# Kafka (Docker: kafka:9092; host dev against compose: localhost:9094)
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=workflow-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-fatal=false

# Append-only audit log — separate Mongo database from ai-registry attachments
spring.data.mongodb.uri=mongodb://localhost:27017/reglens_workflow

# Topics consumed into Mongo `events` (must match producers across the stack)
app.kafka.topic-mapped=obligation.mapped
app.kafka.topic-impact-generated=impact.generated
app.kafka.topic-mapping-suggested=mapping.suggested
app.kafka.topic-document-ingested=document.ingested
app.kafka.topic-ai-system-lifecycle=ai_system.lifecycle

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.com.reglens.workflow_service=DEBUG
logging.level.org.springframework.kafka=DEBUG
