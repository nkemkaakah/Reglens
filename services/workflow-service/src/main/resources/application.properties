spring.application.name=workflow-service
server.port=8084

# Kafka (Docker: kafka:9092; host dev against compose: localhost:9094)
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=workflow-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Append-only audit log — separate Mongo database from ai-registry attachments
spring.data.mongodb.uri=mongodb://localhost:27017/reglens_workflow

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.com.reglens.workflow_service=INFO
