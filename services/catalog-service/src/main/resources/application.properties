spring.application.name=catalog-service
server.port=8081

# Pattern 2: same Postgres DB `reglens`, dedicated schema `catalog` for Flyway + JPA (Feature 3 catalogue).
spring.datasource.url=jdbc:postgresql://localhost:5432/reglens?currentSchema=catalog
spring.datasource.username=reglens
spring.datasource.password=reglens_dev

spring.flyway.enabled=true
spring.flyway.schemas=catalog
spring.flyway.default-schema=catalog
spring.flyway.create-schemas=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=catalog
spring.jpa.properties.hibernate.default_batch_fetch_size=16

app.security.service-token=dev-service-token-change-me

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.com.reglens.catalog_service=INFO
