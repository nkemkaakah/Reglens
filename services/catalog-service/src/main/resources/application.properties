spring.application.name=catalog-service

# Pattern 2: same Postgres DB as other services, dedicated schema `catalog` for Flyway + JPA.
# Compose can override URL/host via SPRING_DATASOURCE_*.
spring.datasource.url=jdbc:postgresql://localhost:5432/reglens?currentSchema=catalog
spring.datasource.username=reglens
spring.datasource.password=reglens_dev

spring.flyway.enabled=true
spring.flyway.schemas=catalog
spring.flyway.default-schema=catalog
spring.flyway.create-schemas=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=catalog
