spring.application.name=catalog-service

# Pattern 2 — Testcontainers supplies JDBC URL; keep Flyway/JPA schema aligned with production.
spring.flyway.schemas=catalog
spring.flyway.default-schema=catalog
spring.flyway.create-schemas=true
spring.jpa.properties.hibernate.default_schema=catalog
spring.jpa.open-in-view=false

app.security.service-token=test-service-token
