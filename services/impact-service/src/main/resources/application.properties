spring.application.name=impact-service
server.port=8082

# Pattern 2: same Postgres DB `reglens`, dedicated schema `impact`.
spring.datasource.url=jdbc:postgresql://localhost:5432/reglens?currentSchema=impact
spring.datasource.username=reglens
spring.datasource.password=reglens_dev

spring.flyway.enabled=true
spring.flyway.schemas=impact
spring.flyway.default-schema=impact
spring.flyway.create-schemas=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=impact

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=impact-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.kafka.topic-mapped=obligation.mapped
app.kafka.topic-impact-generated=impact.generated
app.obligation.service.base-url=http://localhost:8080
app.catalog.service.base-url=http://localhost:8081
app.upstream.timeout-ms=60000
app.security.service-token=dev-service-token-change-me
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
anthropic.api-key=${ANTHROPIC_API_KEY:}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.com.reglens.impact_service=INFO
