# Test defaults
app.security.service-token=test-service-token
app.cors.allowed-origins=http://localhost:5173
spring.application.name=impact-service

# Upstream URLs (required for context; Testcontainers wires DB + Kafka only).
app.obligation.service.base-url=http://localhost:8080
app.catalog.service.base-url=http://localhost:8081
app.kafka.topic-mapped=obligation.mapped
app.kafka.topic-impact-generated=impact.generated
app.upstream.timeout-ms=60000
anthropic.api-key=

# Kafka consumer (ServiceConnection may override bootstrap only; keep group id explicit for tests).
spring.kafka.consumer.group-id=impact-service-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
