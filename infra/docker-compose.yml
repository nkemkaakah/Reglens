# RegLens local stack — extend as services are added.
# From repo root: docker compose -f infra/docker-compose.yml up -d

services:

  postgres:
    image: postgres:16
    container_name: reglens-postgres
    environment:
      POSTGRES_DB: reglens
      POSTGRES_USER: reglens
      POSTGRES_PASSWORD: reglens_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reglens -d reglens"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Planned infra rollout ---
  # Add this when Feature 4 (mappings + events) begins.
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   ...

  # Add this when Feature 7 (workflow/event timeline) begins.
  # mongodb:
  #   image: mongo:7
  #   ...

  # Add this when Feature 8 (notification fan-out/cache) begins.
  # redis:
  #   image: redis:7-alpine
  #   ...

volumes:
  postgres_data:
