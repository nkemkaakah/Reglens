# RegLens local stack — extend as services are added.
# From repo root: docker compose -f infra/docker-compose.yml up -d
#
# Postgres: single database `reglens`; each Java service uses its own schema (Pattern 2).
# If you change schema/Flyway layout, reset the volume once: docker compose -f infra/docker-compose.yml down -v

services:

  obligation-service:
    build:
      context: ../services/obligation-service
      dockerfile: Dockerfile
    container_name: reglens-obligation-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reglens?currentSchema=obligation
      SPRING_DATASOURCE_USERNAME: reglens
      SPRING_DATASOURCE_PASSWORD: reglens_dev
      APP_SECURITY_SERVICE_TOKEN: dev-service-token-change-me
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  reg-ingestion-service:
    build:
      context: ../services/reg-ingestion-service
      dockerfile: Dockerfile
    container_name: reglens-reg-ingestion-service
    environment:
      OBLIGATION_SERVICE_BASE_URL: http://obligation-service:8080
      OBLIGATION_SERVICE_TOKEN: dev-service-token-change-me
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      obligation-service:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: reglens-postgres
    environment:
      POSTGRES_DB: reglens
      POSTGRES_USER: reglens
      POSTGRES_PASSWORD: reglens_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reglens -d reglens"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # --- Planned infra rollout ---
  # Add this when Feature 4 (mappings + events) begins.
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   ...

  # Add this when Feature 7 (workflow/event timeline) begins.
  # mongodb:
  #   image: mongo:7
  #   ...

  # Add this when Feature 8 (notification fan-out/cache) begins.
  # redis:
  #   image: redis:7-alpine
  #   ...

volumes:
  postgres_data:
