# RegLens local stack — extend as services are added.


services:

  obligation-service:
    build:
      context: ../services/obligation-service
      dockerfile: Dockerfile
    container_name: reglens-obligation-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reglens?currentSchema=obligation
      SPRING_DATASOURCE_USERNAME: reglens
      SPRING_DATASOURCE_PASSWORD: reglens_dev
      APP_SECURITY_SERVICE_TOKEN: dev-service-token-change-me
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started

  reg-ingestion-service:
    build:
      context: ../services/reg-ingestion-service
      dockerfile: Dockerfile
    container_name: reglens-reg-ingestion-service
    environment:
      OBLIGATION_SERVICE_BASE_URL: http://obligation-service:8080
      OBLIGATION_SERVICE_TOKEN: dev-service-token-change-me
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      obligation-service:
        condition: service_started
      postgres:
        condition: service_healthy

  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile
    container_name: reglens-catalog-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reglens?currentSchema=catalog
      SPRING_DATASOURCE_USERNAME: reglens
      SPRING_DATASOURCE_PASSWORD: reglens_dev
      APP_SECURITY_SERVICE_TOKEN: dev-service-token-change-me
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: reglens-postgres
    environment:
      POSTGRES_DB: reglens
      POSTGRES_USER: reglens
      POSTGRES_PASSWORD: reglens_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reglens -d reglens"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    container_name: reglens-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 45s

  # Add this when Feature 7 (workflow/event timeline) begins.
  # mongodb:
  #   image: mongo:7
  #   ...

  # Add this when Feature 8 (notification fan-out/cache) begins.
  # redis:
  #   image: redis:7-alpine
  #   ...

volumes:
  postgres_data:
  kafka_data:
