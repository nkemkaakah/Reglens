# Build each service Dockerfile and push to Amazon ECR (private).
# Prerequisites: IAM OIDC role (AWS_ROLE_ARN), ECR repos named reglens-<matrix.name>, optional repo variable AWS_REGION.

name: Docker Build and Push to ECR

permissions:
  id-token: write # required for OIDC
  contents: read
  actions: write # required for docker/build-push-action GHA cache (cache-to: type=gha)

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/docker-build-and-push.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            context: services/api-gateway
          - name: obligation-service
            context: services/obligation-service
          - name: catalog-service
            context: services/catalog-service
          - name: mapping-service
            context: services/mapping-service
          - name: impact-service
            context: services/impact-service
          - name: ai-registry-service
            context: services/ai-registry-service
          - name: workflow-service
            context: services/workflow-service
          - name: notification-service
            context: services/notification-service
          - name: reg-ingestion-service
            context: services/reg-ingestion-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/reglens-${{ matrix.name }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/reglens-${{ matrix.name }}:latest
          cache-from: type=gha,scope=reglens-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=reglens-${{ matrix.name }}
